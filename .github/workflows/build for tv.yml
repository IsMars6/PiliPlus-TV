name: Build For TV

on:
  workflow_dispatch:
    inputs:
      build_tv:
        description: "Build TV Android"
        required: false
        default: true
        type: boolean

      tag:
        description: "版本号（例如：v2.0.3，填写后将自动创建 Release）"
        required: false
        default: ""
        type: string

jobs:
  build-tv:
    if: ${{ inputs.build_tv }}
    name: Build TV Android Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 17
          cache: gradle
          cache-dependency-path: |
            android/*.gradle*
            android/**/gradle-wrapper.properties

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
          cache: true

      - name: Apply Android patch
        shell: pwsh
        run: lib/scripts/patch.ps1 android
        continue-on-error: true

      - name: Create signing config
        if: inputs.tag != ''
        run: |
          if [ -n "${{ secrets.SIGN_KEYSTORE_BASE64 }}" ]; then
            mkdir -p android/app
            echo "${{ secrets.SIGN_KEYSTORE_BASE64 }}" | base64 --decode > android/app/key.jks
            
            cat > android/key.properties << EOF
            storeFile=key.jks
            storePassword=${{ secrets.KEYSTORE_PASSWORD }}
            keyAlias=${{ secrets.KEY_ALIAS }}
            keyPassword=${{ secrets.KEY_PASSWORD }}
            EOF
          fi

      - name: Build version & environment
        shell: pwsh
        run: lib/scripts/build.ps1 android

      - name: Flutter build TV APK
        run: flutter build apk --release --flavor tv --split-per-abi --dart-define-from-file=pili_release.json --pub

      - name: List built APKs
        run: ls -lh build/app/outputs/flutter-apk/

      - name: Rename APKs
        run: |
          cd build/app/outputs/flutter-apk
          for file in app-tv-*.apk; do
            if [[ -f "$file" ]]; then
              abi=$(grep -Eo 'arm64-v8a|armeabi-v7a|x86_64' <<< "$file")
              mv -v "$file" "../../../../PiliPlus_TV_${{ env.version }}_${abi}.apk"
            fi
          done

      - name: Upload all TV APKs as artifacts
        uses: actions/upload-artifact@v7
        with:
          name: PiliPlus_TV_All_APKs
          path: PiliPlus_TV_*.apk
          if-no-files-found: error

      - name: Create GitHub Release
        if: inputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: "PiliPlus TV ${{ inputs.tag }}"
          files: PiliPlus_TV_*.apk
