name: Build TV

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths-ignore:
      - "**.md"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release Tag"
        required: false
        default: ""

jobs:
  android_tv:
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' }}
    name: Build Android TV
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml
          cache: true

      - name: Apply Patch
        run: pwsh lib/scripts/patch.ps1 android
        continue-on-error: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Clean
        run: |
          rm -rf build/ android/app/build/ android/build/
          find android -name "GeneratedPluginRegistrant.java" -delete

      - name: Build Release APK
        if: github.event_name == 'workflow_dispatch'
        run: flutter build apk --release --split-per-abi --no-tree-shake-icons

      - name: Build Dev APK
        if: github.event_name == 'pull_request'
        run: flutter build apk --release --split-per-abi --no-tree-shake-icons --dart-define=dev=1

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: PiliPlus_TV_APK
          path: build/app/outputs/flutter-apk/app-*.apk

      - name: Create Release
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          files: build/app/outputs/flutter-apk/app-*.apk
