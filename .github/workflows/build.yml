name: Build TV

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths-ignore:
      - "**.md"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release Tag"
        required: false
        default: ""

jobs:
  android_tv:
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' }}
    name: Build Android TV
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: pubspec.yaml

      - name: Apply Patch
        run: |
          git config --global user.name "ci"
          git config --global user.email "ci@example.com"
          git reset --hard HEAD
          git revert 362b1de29974ffc1ed6faa826e1df870d7bec75f --no-edit || true
          git apply lib/scripts/modal_barrier.patch || true
          git apply lib/scripts/mouse_cursor.patch || true
          git apply lib/scripts/bottom_sheet.patch || true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Release APK
        if: github.event_name == 'workflow_dispatch'
        run: flutter build apk --release --split-per-abi --no-tree-shake-icons

      - name: Build Dev APK
        if: github.event_name == 'pull_request'
        run: flutter build apk --release --split-per-abi --no-tree-shake-icons --dart-define=dev=1

      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: PiliPlus_TV_APK
          path: build/app/outputs/flutter-apk/app-*.apk
